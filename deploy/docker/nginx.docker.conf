server {
    listen 80;
    server_name _;

    location = /login {
        root /usr/share/nginx/html/portal;
        try_files /login.html =404;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    location = /index.html {
        root /usr/share/nginx/html/portal;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    location / {
        root /usr/share/nginx/html/portal;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /trading/ {
        alias /usr/share/nginx/html/frontend-trading/dist/;
        try_files $uri $uri/ /trading/index.html;
    }

    location = /trading/index.html {
        alias /usr/share/nginx/html/frontend-trading/dist/index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    location /notes/ {
        alias /usr/share/nginx/html/frontend-notes/dist/;
        try_files $uri $uri/ /notes/index.html;
    }

    location = /notes/index.html {
        alias /usr/share/nginx/html/frontend-notes/dist/index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    location = /monitor {
        return 301 /monitor/;
    }

    location /monitor/ {
        alias /usr/share/nginx/html/frontend-monitor/dist/;
        try_files $uri $uri/ /monitor/index.html;
    }

    location = /monitor/index.html {
        alias /usr/share/nginx/html/frontend-monitor/dist/index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    location /ledger/ {
        alias /usr/share/nginx/html/frontend-ledger/dist/;
        try_files $uri $uri/ /ledger/index.html;
    }

    location = /ledger/index.html {
        alias /usr/share/nginx/html/frontend-ledger/dist/index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    location = /ledger {
        return 301 /ledger/;
    }

    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
