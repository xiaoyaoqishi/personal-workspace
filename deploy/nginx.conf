server {
    listen 80;
    server_name tradetrack.top www.tradetrack.top;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name tradetrack.top;

    ssl_certificate /etc/letsencrypt/live/tradetrack.top/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tradetrack.top/privkey.pem;

    return 301 https://www.tradetrack.top$request_uri;
}

server {
    listen 443 ssl http2;
    server_name www.tradetrack.top;

    ssl_certificate /etc/letsencrypt/live/tradetrack.top/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tradetrack.top/privkey.pem;

    location = /login {
        root /opt/tradingRecords/portal;
        try_files /login.html =404;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    location = /index.html {
        root /opt/tradingRecords/portal;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    location /api/auth/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        root /opt/tradingRecords/portal;
        index index.html;
    }

    location /trading/ {
        alias /opt/tradingRecords/frontend-trading/dist/;
        try_files $uri $uri/ /trading/index.html;
    }

    location = /trading/index.html {
        alias /opt/tradingRecords/frontend-trading/dist/index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    location /notes/ {
        alias /opt/tradingRecords/frontend-notes/dist/;
        try_files $uri $uri/ /notes/index.html;
    }

    location = /notes/index.html {
        alias /opt/tradingRecords/frontend-notes/dist/index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    location = /monitor {
        return 301 /monitor/;
    }

    location /monitor/ {
        alias /opt/tradingRecords/frontend-monitor/dist/;
        try_files $uri $uri/ /monitor/index.html;
    }

    location = /monitor/index.html {
        alias /opt/tradingRecords/frontend-monitor/dist/index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    location /ledger/ {
        alias /opt/tradingRecords/frontend-ledger/dist/;
        try_files $uri $uri/ /ledger/index.html;
    }

    location = /ledger/index.html {
        alias /opt/tradingRecords/frontend-ledger/dist/index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    location = /ledger {
        return 301 /ledger/;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
